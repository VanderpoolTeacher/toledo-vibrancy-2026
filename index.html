<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toledo Vibrancy Initiative 2026 — Grant Award Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --facade: #2563eb;
    --planning: #16a34a;
    --whitebox: #ea580c;
    --multi: #7c3aed;
    --bg: #0f172a;
    --panel: #1e293b;
    --ink: #f8fafc;
    --muted: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); }
  .app { display: grid; grid-template-columns: 380px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  header { grid-column: 1 / -1; padding: 16px 24px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
  header h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; }
  .stats { display: flex; gap: 16px; color: var(--muted); font-size: 0.85rem; }
  .stats b { color: var(--ink); font-size: 0.95rem; }
  aside { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
  aside .filters { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; position: sticky; top: 0; background: var(--panel); z-index: 1; }
  aside .filters button { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 0.78rem; cursor: pointer; font-family: inherit; }
  aside .filters button.active { background: #334155; color: var(--ink); border-color: #475569; }
  aside .filters button .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }
  aside ul { list-style: none; margin: 0; padding: 0; }
  aside li { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  aside li:hover { background: #273449; }
  aside li.dim { opacity: 0.25; }
  aside li .addr { font-weight: 600; font-size: 0.95rem; }
  aside li .meta { font-size: 0.8rem; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; }
  aside li .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; color: white; }
  .pill.facade { background: var(--facade); }
  .pill.planning { background: var(--planning); }
  .pill.whitebox { background: var(--whitebox); }
  .pill.multi { background: var(--multi); }
  #map { height: 100%; width: 100%; }
  .leaflet-popup-content-wrapper { background: #1e293b; color: var(--ink); border-radius: 8px; }
  .leaflet-popup-tip { background: #1e293b; }
  .leaflet-popup-content { margin: 12px 14px; font-size: 0.85rem; line-height: 1.45; }
  .leaflet-popup-content .addr { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .leaflet-popup-content .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; color: white; margin-right: 4px; }
  .leaflet-popup-content .hood { color: var(--muted); margin-top: 4px; font-size: 0.8rem; }
  footer { grid-column: 1 / -1; padding: 8px 16px; background: var(--panel); border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); text-align: center; }
  footer a { color: #93c5fd; }
  .marker-pin { width: 22px; height: 22px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 45vh 1fr auto; }
    aside { max-height: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Toledo Vibrancy Initiative — 2026 Grant Awards <small>17 properties · 19 grants · 10 neighborhoods</small></h1>
    <div class="stats">
      <div><b>$630K</b> awarded</div>
      <div><b>$13.5M</b> investment leveraged</div>
      <div><b>82</b> applications</div>
    </div>
  </header>
  <aside>
    <div class="filters" id="filters">
      <button data-f="all" class="active">All (19)</button>
      <button data-f="Facade"><span class="swatch" style="background:var(--facade)"></span>Façade</button>
      <button data-f="Planning"><span class="swatch" style="background:var(--planning)"></span>Planning</button>
      <button data-f="White Box"><span class="swatch" style="background:var(--whitebox)"></span>White Box</button>
      <button data-f="multi"><span class="swatch" style="background:var(--multi)"></span>Multiple</button>
    </div>
    <ul id="list"></ul>
  </aside>
  <div id="map"></div>
  <footer>
    Source: <a href="https://www.wtol.com/article/news/local/here-are-the-19-toledo-properties-selected-for-vibrancy-initiative-grants/512-a58ea8f9-4b68-4e3d-84ec-6d1434970a5c" target="_blank" rel="noopener">WTOL News</a> ·
    <a href="https://toledo.oh.gov/news/2026/05/15/mayor-kapszukiewicz-announces-19-vibrancy-initiative-grant-awards-expected-to-spur-13-5-million-in-investment-across-10-neighborhoods" target="_blank" rel="noopener">City of Toledo press release</a> ·
    <a href="https://toledo.oh.gov/business/vibrancy" target="_blank" rel="noopener">Vibrancy Initiative page</a> ·
    Geocoding: OpenStreetMap Nominatim · Tiles &copy; OSM contributors
  </footer>
</div>

<script>
const properties = [
  { address: "143 Broadway St",     hood: "South Toledo",     programs: ["Facade"],             lat: 41.6426021, lon: -83.5395383 },
  { address: "325 N Superior St",   hood: "Downtown Toledo",  programs: ["Facade"],             lat: 41.6522234, lon: -83.5355683 },
  { address: "606 Adams St",        hood: "Downtown Toledo",  programs: ["Facade"],             lat: 41.6537388, lon: -83.5358983 },
  { address: "820 Woodville Rd",    hood: "East Toledo",      programs: ["Facade"],             lat: 41.6355470, lon: -83.5177487 },
  { address: "902 Washington St",   hood: "Downtown Toledo",  programs: ["Facade"],             lat: 41.6499408, lon: -83.5431317 },
  { address: "912 Monroe St",       hood: "Downtown Toledo",  programs: ["Facade"],             lat: 41.6515298, lon: -83.5423631 },
  { address: "1444 South Ave",      hood: "South Toledo",     programs: ["Facade", "Planning"], lat: 41.6308443, lon: -83.5761127 },
  { address: "1623 Broadway St",    hood: "South Toledo",     programs: ["Facade"],             lat: 41.6391610, lon: -83.5446067 },
  { address: "2164 Tedrow Rd",      hood: "South Toledo",     programs: ["Facade"],             lat: 41.5996484, lon: -83.6194316 },
  { address: "3122 Lagrange St",    hood: "North Toledo",     programs: ["Facade"],             lat: 41.6793426, lon: -83.5406531 },
  { address: "33 N Huron St",       hood: "Downtown Toledo",  programs: ["Planning"],           lat: 41.6488938, lon: -83.5398874 },
  { address: "1000 Adams St",       hood: "Downtown Toledo",  programs: ["Planning"],           lat: 41.6554880, lon: -83.5395600 },
  { address: "1320 Adams St",       hood: "Downtown Toledo",  programs: ["Planning", "White Box"], lat: 41.6567153, lon: -83.5421406 },
  { address: "1256 Broadway St",    hood: "South Toledo",     programs: ["Planning"],           lat: 41.6348261, lon: -83.5508043 },
  { address: "1933 Consaul St",     hood: "East Toledo",      programs: ["Planning"],           lat: 41.6597515, lon: -83.5013653 },
  { address: "2126 Consaul St",     hood: "East Toledo",      programs: ["White Box"],          lat: 41.6587838, lon: -83.4991290 },
  { address: "2582 Monroe St",      hood: "Old West End",     programs: ["White Box"],          lat: 41.6606320, lon: -83.5617740 },
];

const programColor = { "Facade": "var(--facade)", "Planning": "var(--planning)", "White Box": "var(--whitebox)" };
const programHex   = { "Facade": "#2563eb",      "Planning": "#16a34a",         "White Box": "#ea580c" };
const programDesc = {
  "Facade":    "Façade Improvement Grant — restoring or enhancing the visible exterior of a commercial building.",
  "Planning":  "Planning Grant — funds early-stage architectural, engineering, or feasibility work to ready a vacant building for reuse.",
  "White Box": "White Box Grant — interior buildout to make a vacant storefront tenant-ready (electrical, HVAC, drywall, etc.)."
};
const programClass = { "Facade": "facade", "Planning": "planning", "White Box": "whitebox" };

function colorFor(p) {
  if (p.programs.length > 1) return "#7c3aed";
  return programHex[p.programs[0]];
}

const map = L.map('map').setView([41.653, -83.54], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

const list = document.getElementById('list');
const markers = [];

properties.forEach((p, i) => {
  const color = colorFor(p);
  const isMulti = p.programs.length > 1;
  const icon = L.divIcon({
    className: '',
    html: `<div class="marker-pin" style="background:${color}"></div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
  const programPills = p.programs.map(pr => `<span class="pill ${programClass[pr]}">${pr}</span>`).join(' ');
  const programDescs = p.programs.map(pr => `<div style="margin-top:4px;font-size:0.75rem;color:#cbd5e1;">${programDesc[pr]}</div>`).join('');
  const popupHtml = `
    <div class="addr">${p.address}</div>
    <div>${programPills}</div>
    <div class="hood">${p.hood}${isMulti ? ' · multiple awards' : ''}</div>
    ${programDescs}
  `;
  const marker = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popupHtml);
  markers.push({ marker, prop: p, types: isMulti ? ['Facade', 'Planning', 'White Box', 'multi'].filter(t => p.programs.includes(t) || t === 'multi') : p.programs });

  const li = document.createElement('li');
  li.dataset.idx = i;
  li.innerHTML = `
    <div class="addr">${p.address}</div>
    <div class="meta">${p.programs.map(pr => `<span class="pill ${programClass[pr]}">${pr}</span>`).join(' ')} <span>${p.hood}</span></div>
  `;
  li.addEventListener('click', () => {
    map.setView([p.lat, p.lon], 17, { animate: true });
    marker.openPopup();
  });
  list.appendChild(li);
});

const filterBtns = document.querySelectorAll('#filters button');
filterBtns.forEach(b => b.addEventListener('click', () => {
  filterBtns.forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const f = b.dataset.f;
  markers.forEach((m, i) => {
    let show;
    if (f === 'all') show = true;
    else if (f === 'multi') show = m.prop.programs.length > 1;
    else show = m.prop.programs.includes(f);
    if (show) m.marker.addTo(map); else map.removeLayer(m.marker);
    document.querySelectorAll('#list li')[i].classList.toggle('dim', !show);
  });
}));

// Fit map to all markers
const group = L.featureGroup(markers.map(m => m.marker));
map.fitBounds(group.getBounds().pad(0.1));
</script>
</body>
</html>
