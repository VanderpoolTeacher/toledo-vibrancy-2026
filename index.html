<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toledo Vibrancy Initiative 2026 — Grant Award Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --facade: #2563eb;
    --planning: #16a34a;
    --whitebox: #ea580c;
    --multi: #7c3aed;
    --bg: #0f172a;
    --panel: #1e293b;
    --ink: #f8fafc;
    --muted: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); }
  .app { display: grid; grid-template-columns: 420px 1fr; grid-template-rows: auto 1fr auto; height: 100vh; }
  header { grid-column: 1 / -1; padding: 16px 24px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
  header h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; }
  .stats { display: flex; gap: 16px; color: var(--muted); font-size: 0.85rem; }
  .stats b { color: var(--ink); font-size: 0.95rem; }
  aside { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
  aside .filters { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; position: sticky; top: 0; background: var(--panel); z-index: 1; }
  aside .filters button { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 0.78rem; cursor: pointer; font-family: inherit; }
  aside .filters button.active { background: #334155; color: var(--ink); border-color: #475569; }
  aside .filters button .swatch { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }
  aside ul { list-style: none; margin: 0; padding: 0; }
  aside li { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  aside li:hover { background: #273449; }
  aside li.dim { opacity: 0.25; }
  aside li .biz { font-weight: 600; font-size: 0.95rem; }
  aside li .addr { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  aside li .meta { font-size: 0.8rem; color: var(--muted); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  aside li .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; color: white; }
  .pill.facade { background: var(--facade); }
  .pill.planning { background: var(--planning); }
  .pill.whitebox { background: var(--whitebox); }
  .pill.multi { background: var(--multi); }
  #map { height: 100%; width: 100%; }
  .leaflet-popup-content-wrapper { background: #1e293b; color: var(--ink); border-radius: 8px; }
  .leaflet-popup-tip { background: #1e293b; }
  .leaflet-popup-content { margin: 14px 16px; font-size: 0.85rem; line-height: 1.5; max-height: 60vh; overflow-y: auto; }
  .leaflet-popup-content .biz { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .leaflet-popup-content .addr { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .leaflet-popup-content .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; color: white; margin-right: 4px; margin-bottom: 4px; }
  .leaflet-popup-content .desc { margin-top: 8px; color: #e2e8f0; font-size: 0.82rem; }
  .leaflet-popup-content .amt { color: #fde68a; font-weight: 600; }
  .leaflet-popup-content .amt sup { font-size: 0.7em; color: #fbbf24; margin-left: 1px; }
  .leaflet-popup-content .src { margin-top: 10px; padding-top: 8px; border-top: 1px solid #334155; font-size: 0.72rem; color: var(--muted); }
  .leaflet-popup-content .src a { color: #93c5fd; }
  footer { grid-column: 1 / -1; padding: 8px 16px; background: var(--panel); border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); text-align: center; }
  footer a { color: #93c5fd; }
  .marker-pin { width: 22px; height: 22px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .reset-btn { background: #ea580c; color: #fff; border: 1px solid #c2410c; border-radius: 8px; padding: 10px 16px; font-size: 0.95rem; font-weight: 600; font-family: inherit; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.35); }
  .reset-btn:hover { background: #f97316; }
  .leaflet-control.reset-control { margin: 10px; }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 55vh 1fr auto; }
    header { padding: 10px 14px; gap: 8px; }
    header h1 { font-size: 0.95rem; line-height: 1.3; }
    header h1 small { display: block; margin-left: 0; margin-top: 2px; font-size: 0.8rem; }
    .stats { gap: 10px; font-size: 0.75rem; flex-wrap: wrap; }
    .stats b { font-size: 0.85rem; }
    #map { grid-row: 2; grid-column: 1; }
    aside { grid-row: 3; grid-column: 1; max-height: none; border-right: none; border-top: 1px solid var(--border); }
    aside .filters { padding: 10px 12px; gap: 5px; }
    aside .filters button { font-size: 0.75rem; padding: 4px 8px; }
    aside li { padding: 10px 14px; }
    .leaflet-popup-content { max-height: 38vh; font-size: 0.88rem; margin: 12px 14px; }
    .leaflet-popup-content .biz { font-size: 1rem; }
    .leaflet-popup-content .desc { font-size: 0.85rem; }
    .reset-btn { padding: 8px 12px; font-size: 0.85rem; }
    footer { padding: 8px 12px; font-size: 0.7rem; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Toledo Vibrancy Initiative — 2026 Grant Awards <small>17 properties · 19 grants · 10 neighborhoods</small></h1>
    <div class="stats">
      <div><b>$630K</b> awarded</div>
      <div><b>$13.5M</b> investment leveraged</div>
      <div><b>82</b> applications</div>
    </div>
  </header>
  <aside>
    <div class="filters" id="filters">
      <button data-f="all" class="active">All (17)</button>
      <button data-f="Facade"><span class="swatch" style="background:var(--facade)"></span>Façade</button>
      <button data-f="Planning"><span class="swatch" style="background:var(--planning)"></span>Planning</button>
      <button data-f="White Box"><span class="swatch" style="background:var(--whitebox)"></span>White Box</button>
      <button data-f="multi"><span class="swatch" style="background:var(--multi)"></span>Multiple</button>
    </div>
    <ul id="list"></ul>
  </aside>
  <div id="map"></div>
  <footer>
    Source: <a href="https://gis.toledo.oh.gov/arcgis/rest/services/Hosted/Vibrancy_Projects/FeatureServer/2" target="_blank" rel="noopener">City of Toledo Vibrancy Projects feature service</a> ·
    <a href="https://toledo.oh.gov/news/2026/05/15/mayor-kapszukiewicz-announces-19-vibrancy-initiative-grant-awards-expected-to-spur-13-5-million-in-investment-across-10-neighborhoods" target="_blank" rel="noopener">City press release</a> ·
    <a href="https://www.wtol.com/article/news/local/here-are-the-19-toledo-properties-selected-for-vibrancy-initiative-grants/512-a58ea8f9-4b68-4e3d-84ec-6d1434970a5c" target="_blank" rel="noopener">WTOL</a> ·
    Tiles &copy; CARTO / OSM contributors
  </footer>
</div>

<script>
const properties = [
  {
    business: "Moriarty Machinery & Supply",
    address: "143 Broadway St",
    hood: "South Toledo",
    programs: ["Facade"],
    lat: 41.6426021, lon: -83.5395383,
    desc: "Facade Improvement Grant for exterior upgrades to Moriarty Machinery & Supply, Inc., a construction-related business doing equipment rentals, maintenance, parts resale, and safety solutions. Work includes updated signage and replacement of outdated entry doors. Estimated façade investment: ~$65,000."
  },
  {
    business: "325 N. Superior (incoming restaurant tenant)",
    address: "325 N Superior St",
    hood: "Downtown Toledo",
    programs: ["Facade"],
    lat: 41.6522234, lon: -83.5355683,
    desc: "Facade Improvement Grant for a major storefront and upper-floor façade restoration of a historic downtown mixed-use building, with an incoming restaurant tenant planned for the first floor. Work includes tuckpointing, window restoration, new canopy, storefront windows and doors, brick and sidewalk repair, painting, and access control. Total estimated redevelopment: ~$1,250,000."
  },
  {
    business: "606 Adams (multi-tenant: attorneys, re-entry program, trucking, wig maker, security firm)",
    address: "606 Adams St",
    hood: "Downtown Toledo",
    programs: ["Facade"],
    lat: 41.6537388, lon: -83.5358983,
    desc: "Facade Improvement Grant for exterior rehabilitation of a multi-tenant commercial building currently occupied by six small businesses. Work includes removal/replacement of rotted fascia, board-and-batten siding, exterior lighting, planter boxes, and façade painting and caulking. Construction was anticipated to begin July 2026."
  },
  {
    business: "MedCare Urgent Care Toledo",
    address: "820 Woodville Rd",
    hood: "East Toledo",
    programs: ["Facade"],
    lat: 41.6355470, lon: -83.5177487,
    desc: "Facade Improvement Grant to support redevelopment of a vacant commercial property planned for occupancy by MedCare Urgent Care Toledo, LLC. Work includes relocating the storefront, new windows and lighting, repainting and refinishing the façade and signage, fence removal, and parking lot resurfacing. Estimated façade investment: ~$50,000–$55,000."
  },
  {
    business: "Toledo Repertoire Theatre (outbuilding)",
    address: "902 Washington St",
    hood: "Downtown Toledo",
    programs: ["Facade"],
    lat: 41.6499408, lon: -83.5431317,
    desc: "Facade Improvement Grant for exterior rehabilitation of a c.1900 building on the Toledo Repertoire Theatre campus used for rehearsal, costume, and production space. Work includes brick repair from storm damage, repainting to match the historic design, and extensive window and door replacements across both floors."
  },
  {
    business: "Culture Clash Records / The Switchboard Bar (Tim & Lizzie Friedman)",
    address: "912 Monroe St",
    hood: "Downtown Toledo",
    programs: ["Facade"],
    lat: 41.6515298, lon: -83.5423631,
    desc: "Facade Improvement Grant (Phase 1) for façade and exterior rehab of the owners' historic commercial property, following a 2025 Façade Planning Grant that funded Engage Studio Architects' drawings. Work includes new storefront systems, windows, entrance canopy, exterior painting, lighting, tuckpointing, and masonry repair across two elevations. Total estimated project cost: ~$469,000."
  },
  {
    business: "El Tipico Restaurant",
    address: "1444 South Ave",
    hood: "South Toledo (Walbridge)",
    programs: ["Facade"],
    lat: 41.6308443, lon: -83.5761127,
    desc: "Facade Improvement Grant for exterior improvements to the commercial building occupied by El Tipico Restaurant. Work includes window and door upgrades and exterior lighting enhancements. Notable as the first Vibrancy Initiative project awarded within the Walbridge neighborhood."
  },
  {
    business: "Mosaic Theatre redevelopment",
    address: "1623 Broadway St",
    hood: "South Toledo",
    programs: ["Facade", "Planning"],
    lat: 41.6391610, lon: -83.5446067,
    desc: "Façade Improvement Grant and Planning Grant supporting redevelopment of a vacant historic three-story Mosaic Theatre. Work includes masonry restoration, replacement doors and windows, and upgraded exterior lighting as part of a broader ~$5,000,000 redevelopment. Planned to house community programming for low-income families including Baby University and an Early Learning Center (cradle-to-career)."
  },
  {
    business: "Kidnetic Play Café",
    address: "2164 Tedrow Rd",
    hood: "South Toledo",
    programs: ["Facade"],
    lat: 41.5996484, lon: -83.6194316,
    desc: "Facade Improvement Grant for exterior upgrades to Kidnetic Play Café, a family-oriented indoor play café with café space for caregivers. Work includes new exterior paint, signage, lighting, and updated entry features for accessibility. Estimated project investment: ~$75,000."
  },
  {
    business: "Children's Theatre Workshop / Ohio Theatre",
    address: "3112 Lagrange St",
    hood: "North Toledo (Polish Village)",
    programs: ["Facade"],
    lat: 41.6791119, lon: -83.5405517,
    desc: "Facade Improvement Grant for exterior improvements to the historic Ohio Theatre, home of Children's Theatre Workshop (a nonprofit youth theatre). Work includes ADA-compliant entry doors and wooden storefront façade repair. Part of a broader ~$3,100,000 rehab. The organization previously received a White Box Grant for the adjacent administrative building."
  },
  {
    business: "Okun Market (Okun Produce Building)",
    address: "33 N Huron St",
    hood: "Downtown Toledo",
    programs: ["Planning"],
    lat: 41.6488938, lon: -83.5398874,
    desc: "Planning Grant for architectural plans and tenant improvement design for the first floor of the historic Okun Produce Building (130+ years old, on the National Register). Planned to become Okun Market — a new downtown grocery store that intends to accept SNAP — plus a complementary retail tenant such as a coffee shop."
  },
  {
    business: "The Arts Commission of Greater Toledo (1st floor)",
    address: "1000 Adams St",
    hood: "Downtown Toledo (Uptown)",
    programs: ["Planning"],
    lat: 41.6554880, lon: -83.5395600,
    desc: "Planning Grant for design work to transform ~13,000 sq ft of long-vacant first-floor space (vacant 30+ years) in the building occupied by The Arts Commission of Greater Toledo. Long-term vision: a nonprofit public art gallery, performance/event venue, educational workshop space, and artist studios. Future redevelopment cost: ~$3.2 million."
  },
  {
    business: "Gathering Volumes Bookstore (2nd location)",
    address: "1320 Adams St",
    hood: "Downtown Toledo",
    programs: ["Planning", "White Box"],
    lat: 41.6567153, lon: -83.5421406,
    desc: "Planning Grant + White Box Grant to redevelop a vacant building into a second location for Gathering Volumes LLC, a locally owned independent bookstore. Work includes new electrical, plumbing, heating, drywall, accessibility, and fire safety systems, plus door and window restoration. Total estimated improvement cost: ~$276,644, with future phases for façade and upper-floor residential."
  },
  {
    business: "Historic South Plaza — Unit 4",
    address: "1256 Broadway St",
    hood: "South Toledo (Old South End)",
    programs: ["White Box"],
    lat: 41.6348261, lon: -83.5508043,
    desc: "White Box Grant to redevelop Unit 4 of the Historic South Plaza shopping center — the center's final vacancy, empty ~3 years (formerly a cell phone store). Work includes demolition, ADA upgrades, plumbing/electrical/HVAC, flooring, lighting, ceilings, partition walls, finishes, millwork, and signage. Estimated investment: ~$100,000. Part of Historic South Initiative's Broadway corridor revitalization."
  },
  {
    business: "1933 Consaul (twin building redevelopment)",
    address: "1933 Consaul St",
    hood: "East Toledo (Birmingham)",
    programs: ["Planning"],
    lat: 41.6597515, lon: -83.5013653,
    desc: "Planning Grant for design work on a vacant mixed-use building (vacant 10+ years) connected to its 'twin' at 1935 Consaul St. Plans envision first-floor flex commercial — coffee shop, bakery, boutique retail, bookstore, or ice cream shop — with new apartments on the second floor. Located near Glass City Metropark."
  },
  {
    business: "Orosz Building (mixed-use)",
    address: "2126 Consaul St",
    hood: "East Toledo (Birmingham)",
    programs: ["White Box"],
    lat: 41.6587838, lon: -83.4991290,
    desc: "White Box Grant for a full gut renovation of a long-vacant mixed-use commercial/residential property (vacant ~11 years). Owner is flexible on tenancy — envisioning art studios, salons, boutiques, nonprofit offices, or other neighborhood-serving small businesses on the first floor, with apartments above. Strategically near Glass City Metropark."
  },
  {
    business: "Temple of Taper (barbershop)",
    address: "2582 Monroe St",
    hood: "Old West End",
    programs: ["White Box"],
    lat: 41.6606320, lon: -83.5617740,
    desc: "White Box Grant to redevelop a long-vacant former service station (vacant 15+ years) into Temple of Taper, a new neighborhood barbershop in the Old West End. Work includes electrical, plumbing, HVAC, accessibility, flooring, lighting, finishes, partition buildout, complete interior renovation, and exterior upgrades that preserve the neighborhood's historic character. Estimated investment: ~$100,000."
  }
];

const programHex   = { "Facade": "#2563eb",      "Planning": "#16a34a",         "White Box": "#ea580c" };
const programClass = { "Facade": "facade", "Planning": "planning", "White Box": "whitebox" };

function colorFor(p) {
  if (p.programs.length > 1) return "#7c3aed";
  return programHex[p.programs[0]];
}

const map = L.map('map').setView([41.653, -83.54], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 20,
  subdomains: 'abcd',
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

const list = document.getElementById('list');
const markers = [];

properties.forEach((p, i) => {
  const color = colorFor(p);
  const isMulti = p.programs.length > 1;
  const icon = L.divIcon({
    className: '',
    html: `<div class="marker-pin" style="background:${color}"></div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
  const programPills = p.programs.map(pr => `<span class="pill ${programClass[pr]}">${pr}</span>`).join(' ');
  const dashboardUrl = "https://www.arcgis.com/apps/dashboards/750dcc63deec4520bead6cd5c63c6c0e";
  const rawDataUrl = "https://gis.toledo.oh.gov/arcgis/rest/services/Hosted/Vibrancy_Projects/FeatureServer/2/query?where=program_year%3D2026&outFields=*&f=json";
  const annotatedDesc = p.desc.replace(
    /\$[\d,]+(?:\.\d+)?(?:\s*[–\-]\s*\$?[\d,]+(?:\.\d+)?)?(?:\s*million|\s*billion)?/g,
    '<span class="amt">$&<sup>*</sup></span>'
  );
  const popupHtml = `
    <div class="biz">${p.business}</div>
    <div class="addr">${p.address} · ${p.hood}</div>
    <div>${programPills}${isMulti ? ' <span class="pill multi">Multiple</span>' : ''}</div>
    <div class="desc">${annotatedDesc}</div>
    <div class="src"><sup>*</sup> Project descriptions and estimated investment figures come from the City of Toledo's <a href="${dashboardUrl}" target="_blank" rel="noopener">Vibrancy Initiative dashboard</a> (or its <a href="${rawDataUrl}" target="_blank" rel="noopener">raw feature-service JSON</a>). Dollar amounts are the applicant's estimated total project cost, not the city grant amount.</div>
  `;
  const popupMaxWidth = Math.min(380, window.innerWidth - 40);
  const marker = L.marker([p.lat, p.lon], { icon }).addTo(map).bindPopup(popupHtml, { maxWidth: popupMaxWidth, autoPan: false });
  marker.on('popupopen', (e) => {
    const targetZoom = Math.max(map.getZoom(), 16);
    const popupEl = e.popup.getElement();
    const popupHeight = popupEl ? popupEl.offsetHeight : 260;
    const mapHeight = map.getSize().y;
    const isMobile = window.innerWidth <= 720;
    let offset;
    if (isMobile) {
      offset = Math.min(Math.max(popupHeight - mapHeight * 0.15, mapHeight * 0.32), mapHeight * 0.42);
    } else {
      offset = Math.min(popupHeight / 2, mapHeight * 0.35);
    }
    const px = map.project([p.lat, p.lon], targetZoom);
    px.y -= offset;
    const center = map.unproject(px, targetZoom);
    map.setView(center, targetZoom, { animate: true });
  });
  markers.push({ marker, prop: p });

  const li = document.createElement('li');
  li.dataset.idx = i;
  li.innerHTML = `
    <div class="biz">${p.business}</div>
    <div class="addr">${p.address} · ${p.hood}</div>
    <div class="meta">${p.programs.map(pr => `<span class="pill ${programClass[pr]}">${pr}</span>`).join(' ')}${isMulti ? ' <span class="pill multi">Multiple</span>' : ''}</div>
  `;
  li.addEventListener('click', () => {
    marker.openPopup();
    map.setView([p.lat, p.lon], 17, { animate: true });
  });
  list.appendChild(li);
});

const filterBtns = document.querySelectorAll('#filters button');
filterBtns.forEach(b => b.addEventListener('click', () => {
  filterBtns.forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const f = b.dataset.f;
  markers.forEach((m, i) => {
    let show;
    if (f === 'all') show = true;
    else if (f === 'multi') show = m.prop.programs.length > 1;
    else show = m.prop.programs.includes(f);
    if (show) m.marker.addTo(map); else map.removeLayer(m.marker);
    document.querySelectorAll('#list li')[i].classList.toggle('dim', !show);
  });
}));

const group = L.featureGroup(markers.map(m => m.marker));
const initialBounds = group.getBounds().pad(0.1);
map.fitBounds(initialBounds);

function resetMap() {
  document.querySelector('#filters button[data-f="all"]').click();
  map.closePopup();
  map.fitBounds(initialBounds);
}

const ResetControl = L.Control.extend({
  options: { position: 'topright' },
  onAdd: function() {
    const btn = L.DomUtil.create('button', 'reset-btn leaflet-control reset-control');
    btn.type = 'button';
    btn.title = 'Reset map view and filters';
    btn.innerHTML = '↺ Reset map';
    L.DomEvent.disableClickPropagation(btn);
    L.DomEvent.on(btn, 'click', resetMap);
    return btn;
  }
});
map.addControl(new ResetControl());
</script>
</body>
</html>
